<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاسبه‌گر آنلاین قیمت توری پلیسه - اوج وین</title>
    <!-- Import Vazirmatn Font for beautiful Persian typography -->
    <link href="https://cdn.jsdelivr.net/npm/vazirmatn@3.0.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    
    <style>
        :root {
            --primary-color: #145E61;     /* Dark Teal */
            --primary-light: #1b7a7e;
            --accent-color: #C9A227;      /* Gold */
            --accent-hover: #b08d20;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --border-color: #e2e8f0;
            --danger-color: #e53e3e;
            --success-color: #38a169;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Vazirmatn, Tahoma, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Widget Container */
        .calculator-widget {
            background: var(--card-bg);
            width: 100%;
            max-width: 650px;
            border-radius: var(--radius);
            box-shadow: 0 10px 25px rgba(20, 94, 97, 0.1);
            padding: 25px;
            border-top: 5px solid var(--primary-color);
        }

        .widget-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .widget-header h2 {
            color: var(--primary-color);
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .widget-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Dynamic Rows */
        .items-container {
            margin-bottom: 20px;
        }

        .row-item {
            background: #fafafa;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 18px;
            margin-bottom: 15px;
            position: relative;
            transition: all 0.2s ease;
        }

        .row-item:hover {
            border-color: var(--primary-light);
        }

        .row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--primary-color);
        }

        .btn-remove {
            background: none;
            border: none;
            color: var(--danger-color);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 5px;
            line-height: 1;
        }

        .inputs-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: var(--text-main);
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            background-color: #fff;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(20, 94, 97, 0.1);
        }

        .row-price-display {
            margin-top: 12px;
            text-align: left;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .row-price-display span {
            color: var(--primary-color);
            font-size: 1.05rem;
        }

        /* Action Buttons */
        .btn-add-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            background: none;
            border: 2px dashed var(--primary-color);
            color: var(--primary-color);
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .btn-add-row:hover {
            background: rgba(20, 94, 97, 0.05);
        }

        /* Summary Card */
        .summary-card {
            background: linear-gradient(135deg, var(--primary-color) 0%, #0d4244 100%);
            color: #fff;
            border-radius: var(--radius);
            padding: 20px;
            margin-top: 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(20, 94, 97, 0.2);
        }

        .summary-title {
            font-size: 1.1rem;
            font-weight: 600;
            opacity: 0.9;
        }

        .summary-total {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-color);
        }

        /* Lead Form */
        .lead-form {
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .lead-form h3 {
            font-size: 1.1rem;
            color: var(--primary-color);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .lead-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            box-shadow: 0 4px 10px rgba(201, 162, 39, 0.2);
        }

        .btn-submit:hover {
            background-color: var(--accent-hover);
        }

        /* Notifications */
        .alert-message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            display: none;
            font-weight: 600;
            text-align: center;
        }
        .alert-danger {
            background-color: #fed7d7;
            color: var(--danger-color);
        }
        .alert-success {
            background-color: #c6f6d5;
            color: var(--success-color);
        }

        /* Desktop Layout Adaptations (>= 480px) */
        @media (min-width: 500px) {
            .inputs-grid {
                grid-template-columns: 1fr 1fr 1.2fr;
            }
            .lead-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="calculator-widget">
        <div class="widget-header">
            <h2>محاسبه هوشمند قیمت توری پلیسه</h2>
            <p>ابعاد بازشوهای خود را وارد کنید تا قیمت تقریبی بلافاصله محاسبه شود.</p>
        </div>

        <!-- Main container for dynamic list items -->
        <div class="items-container" id="itemsContainer"></div>

        <!-- Add item button -->
        <button type="button" class="btn-add-row" onclick="addRow()">
            <span>➕</span> افزودن ابعاد پنجره دیگر
        </button>

        <!-- Pricing Summary Box -->
        <div class="summary-card">
            <div class="summary-title">جمع کل مـبلغ:</div>
            <div class="summary-total" id="grandTotalDisplay">۰ تومان</div>
        </div>

        <!-- Lead Capture Form Section -->
        <form class="lead-form" id="leadCaptureForm" onsubmit="handleLeadSubmit(event)">
            <h3>ثبت درخواست مشاوره و خرید نهایی</h3>
            <div class="lead-grid">
                <div class="form-group">
                    <label for="leadName">نام و نام خانوادگی</label>
                    <input type="text" id="leadName" class="form-control" placeholder="مثال: علیرضا محمدی" required>
                </div>
                <div class="form-group">
                    <label for="leadPhone">شماره تماس</label>
                    <input type="tel" id="leadPhone" class="form-control" placeholder="مثال: 09123456789" style="text-align: left; direction: ltr;" required>
                </div>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">درخواست ثبت سفارش</button>
            
            <div id="alertBox" class="alert-message"></div>
        </form>
    </div>

    <script>
        // 🔴 تنظیمات اتصال به تلگرام
        const TELEGRAM_BOT_TOKEN = "8890320684:AAF04n-RtbYd7MvNoUaMVYdfsR7wNxVzUTU";
        const TELEGRAM_CHAT_ID = "78048785";

        // Configurable Color Rates per square meter (Iranian Toman)
        const COLOR_PRICES = {
            "white": 2900000,
            "black": 3100000,
            "brown": 3200000,
            "champagne": 4200000,
            "beige": 4200000
        };

        const COLOR_NAMES_FA = {
            "white": "سفید",
            "black": "مشکی",
            "brown": "قهوه‌ای",
            "champagne": "شامپاینی",
            "beige": "بژ"
        };

        const MIN_BILLABLE_AREA = 1.15;
        let rowCounter = 0;

        // Add a row to the interface on load or click
        function addRow() {
            rowCounter++;
            const container = document.getElementById('itemsContainer');
            
            const rowDiv = document.createElement('div');
            rowDiv.className = 'row-item';
            rowDiv.id = `row_${rowCounter}`;
            
            rowDiv.innerHTML = `
                <div class="row-header">
                    <span>ردیف #${container.children.length + 1}</span>
                    ${container.children.length > 0 ? `<button type="button" class="btn-remove" onclick="removeRow(${rowCounter})">✕</button>` : ''}
                </div>
                <div class="inputs-grid">
                    <div class="form-group">
                        <label>عرض (متر)</label>
                        <input type="number" step="0.01" min="0.1" class="form-control val-width" placeholder="مثال: 1.2" oninput="calculateWidgetTotals()">
                    </div>
                    <div class="form-group">
                        <label>ارتفاع (متر)</label>
                        <input type="number" step="0.01" min="0.1" class="form-control val-height" placeholder="مثال: 1.8" oninput="calculateWidgetTotals()">
                    </div>
                    <div class="form-group">
                        <label>رنگ پروفایل قاب</label>
                        <select class="form-control val-color" onchange="calculateWidgetTotals()">
                            <option value="white">سفید</option>
                            <option value="black">مشکی</option>
                            <option value="brown">قهوه‌ای</option>
                            <option value="champagne">شامپاینی</option>
                            <option value="beige">بژ</option>
                        </select>
                    </div>
                </div>
                <div class="row-price-display">قیمت این ردیف: <span id="price_span_${rowCounter}">۰ تومان</span></div>
            `;
            
            container.appendChild(rowDiv);
            calculateWidgetTotals();
            reindexRowLabels();
        }

        // Delete row action
        function removeRow(id) {
            const row = document.getElementById(`row_${id}`);
            if (row) {
                row.remove();
                calculateWidgetTotals();
                reindexRowLabels();
            }
        }

        // Keep Row tags dynamically numeric sequentially (e.g. ردیف #1, ردیف #2)
        function reindexRowLabels() {
            const container = document.getElementById('itemsContainer');
            Array.from(container.children).forEach((row, idx) => {
                const label = row.querySelector('.row-header span');
                if (label) label.innerText = `ردیف #${idx + 1}`;
            });
        }

        // Main live calculation engine logic
        function calculateWidgetTotals() {
            const container = document.getElementById('itemsContainer');
            const rows = container.getElementsByClassName('row-item');
            let grandTotal = 0;

            Array.from(rows).forEach(row => {
                const id = row.id.split('_')[1];
                const width = parseFloat(row.querySelector('.val-width').value) || 0;
                const height = parseFloat(row.querySelector('.val-height').value) || 0;
                const colorKey = row.querySelector('.val-color').value;
                const priceSpan = document.getElementById(`price_span_${id}`);
                
                let rowTotal = 0;

                if (width > 0 && height > 0) {
                    let area = width * height;
                    // Apply minimum charging constraint rule
                    if (area < MIN_BILLABLE_AREA) {
                        area = MIN_BILLABLE_AREA;
                    }
                    const rate = COLOR_PRICES[colorKey] || 0;
                    rowTotal = Math.round(area * rate);
                    grandTotal += rowTotal;

                    priceSpan.innerText = formatPersianCurrency(rowTotal);
                } else {
                    priceSpan.innerText = "۰ تومان";
                }
            });

            document.getElementById('grandTotalDisplay').innerText = formatPersianCurrency(grandTotal);
        }

        // Formats numerical balances beautifully to local standard standards
        function formatPersianCurrency(num) {
            if (num === 0) return "۰ تومان";
            return num.toLocaleString('fa-IR') + ' تومان';
        }

        // Client-side validator and Telegram API integration
        function handleLeadSubmit(event) {
            event.preventDefault();
            
            const name = document.getElementById('leadName').value.trim();
            const phone = document.getElementById('leadPhone').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            
            // Check rows logic constraint
            const rows = document.getElementsByClassName('row-item');
            let hasValidDimensions = false;
            let itemsTextForTelegram = "";
            let itemIndex = 1;
            let grandTotal = 0;

            Array.from(rows).forEach(row => {
                const w = parseFloat(row.querySelector('.val-width').value) || 0;
                const h = parseFloat(row.querySelector('.val-height').value) || 0;
                const colorKey = row.querySelector('.val-color').value;
                const colorName = COLOR_NAMES_FA[colorKey];

                if (w > 0 && h > 0) {
                    hasValidDimensions = true;
                    let area = w * h;
                    if (area < MIN_BILLABLE_AREA) area = MIN_BILLABLE_AREA;
                    const rate = COLOR_PRICES[colorKey] || 0;
                    const rowPrice = Math.round(area * rate);
                    grandTotal += rowPrice;

                    itemsTextForTelegram += `
🔹 ردیف ${itemIndex}: عرض ${w} × ارتفاع ${h} متر | رنگ: ${colorName} ➔ ${rowPrice.toLocaleString('fa-IR')} تومان`;
                    itemIndex++;
                }
            });

            if (!hasValidDimensions) {
                showAlert("لطفاً حداقل ابعاد (عرض و ارتفاع) یک پنجره را به صورت معتبر وارد کنید.", "danger");
                return;
            }

            // Simple Phone filter
            if (!/^[0-9۰-۹]{10,11}$/.test(phone.replace(/[٠-٩۰-۹]/g, 'a'))) {
                showAlert("لطفاً شماره تماس معتبر وارد کنید.", "danger");
                return;
            }

            // Disable button during network request
            submitBtn.disabled = true;
            submitBtn.innerText = "در حال ارسال درخواست...";

            // Prepare Telegram Message Text
            const messageText = `🔔 *درخواست جدید ثبت سفارش (اوج وین)*

👤 *نام مشتری:* ${name}
📞 *شماره تماس:* ${phone}

📐 *جزئیات ابعاد وارد شده:*${itemsTextForTelegram}

💰 *جمع کل مبلغ محاسباتی:* ${grandTotal.toLocaleString('fa-IR')} تومان`;

            // Telegram API Endpoint
            const telegramUrl = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;

            fetch(telegramUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: messageText,
                    parse_mode: 'Markdown'
                })
            })
            .then(response => {
                if (response.ok) {
                    showAlert("درخواست شما با موفقیت ثبت شد. کارشناسان اوج وین به‌زودی با شما تماس می‌گیرند.", "success");
                    document.getElementById('leadCaptureForm').reset();
                    // Clear all rows and re-add single blank row
                    document.getElementById('itemsContainer').innerHTML = "";
                    addRow();
                } else {
                    showAlert("خطا در ارسال اطلاعات به تلگرام. لطفا مجددا تلاش کنید یا تماس بگیرید.", "danger");
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showAlert("خطای شبکه. لطفا اتصال اینترنت خود را بررسی کنید.", "danger");
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerText = "درخواست ثبت سفارش";
            });
        }

        function showAlert(msg, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.innerText = msg;
            alertBox.className = `alert-message alert-${type}`;
            alertBox.style.display = 'block';
            
            if(type === 'success') {
                setTimeout(() => { alertBox.style.display = 'none'; }, 6000);
            }
        }

        // Auto initialize the app layout with a blank starter row item on execution load 
        window.onload = function() {
            addRow();
        };
    </script>
</body>
</html>
